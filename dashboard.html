<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL: TOTALITARIAN v4.0.0</title>
    <style>
        :root {
            --blue: #00a2ff; --red: #ff3131; --gold: #ffcc00; --green: #39ff14;
            --purple: #bc13fe; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a;
            --text: #e0e0e0; --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* --- Animations --- */
        @keyframes pulsePurple { 0% { box-shadow: 0 0 5px var(--purple); } 50% { box-shadow: 0 0 25px var(--purple); } 100% { box-shadow: 0 0 5px var(--purple); } }
        @keyframes strobeRed { 0% { background: #000; } 50% { background: #1a0000; } 100% { background: #000; } }
        .chastity-active { border: 2px solid var(--purple) !important; animation: pulsePurple 2s infinite; }

        /* --- Layout --- */
        .header { 
            background: var(--panel); border-bottom: 2px solid var(--border); 
            display: grid; grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 8px; 
        }
        .stat-card { background: #050505; padding: 10px; border: 1px solid var(--border); border-radius: 5px; }
        .stat-card p { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; font-weight: 900; }
        .stat-card h2 { margin: 0; font-size: 1.2rem; font-family: monospace; }

        .nav-roster { 
            display: flex; overflow-x: auto; background: #020202; 
            padding: 10px; gap: 12px; border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .nav-roster::-webkit-scrollbar { display: none; }
        .master-thumb { 
            min-width: 60px; text-align: center; opacity: 0.5; transition: 0.3s; position: relative;
        }
        .master-thumb.active { opacity: 1; transform: scale(1.1); }
        .master-thumb img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; object-fit: cover; }
        .master-thumb.active img { border-color: var(--blue); }
        .master-thumb.keyholder img { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Task Panel --- */
        .task-area { background: #080808; border-bottom: 1px solid var(--border); padding: 15px; text-align: center; }
        #task-desc { color: var(--gold); font-weight: bold; font-size: 0.9rem; min-height: 40px; margin-bottom: 10px; line-height: 1.4; }
        #task-clock { font-size: 3rem; font-family: monospace; color: var(--red); font-weight: 900; margin: 5px 0; }
        .task-controls { display: flex; gap: 8px; }
        .task-controls button { 
            flex: 1; padding: 12px; border: none; border-radius: 4px; 
            font-weight: bold; text-transform: uppercase; font-size: 0.7rem; cursor: pointer;
        }
        .btn-order { background: var(--blue); color: #fff; }
        .btn-done { background: var(--green); color: #000; }
        .btn-fail { background: #200; color: var(--red); border: 1px solid #400 !important; }

        /* --- Chat Area --- */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #111; color: #888; border: 1px solid #222; border-bottom-right-radius: 2px; }
        .msg.dom { align-self: flex-start; background: #001a2c; color: #fff; border-left: 4px solid var(--blue); border-bottom-left-radius: 2px; }

        /* --- Input --- */
        .input-box { background: var(--panel); border-top: 1px solid var(--border); padding: 12px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        .tribute-row { display: flex; gap: 8px; align-items: center; }
        #trib-amt { width: 90px; background: #000; border: 1px solid #333; color: var(--green); padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1rem; }
        .btn-trib { flex: 1; background: var(--green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }

        /* --- Overlays --- */
        #status-ribbon { background: var(--purple); color: #fff; font-size: 0.7rem; font-weight: bold; text-align: center; padding: 4px; display: none; text-transform: uppercase; letter-spacing: 1px; }
        
        #lockout-screen { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 99999; 
            flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        #lockout-screen h1 { color: var(--red); font-size: 2.5rem; margin: 0; }
        #lockout-timer { font-size: 4rem; font-family: monospace; margin: 20px 0; color: #fff; }
        #labor-target { color: var(--gold); font-style: italic; margin-bottom: 20px; font-size: 1.1rem; background: #111; padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; }
        #labor-input { width: 100%; max-width: 400px; background: #000; border: 2px solid #333; color: #fff; padding: 15px; text-align: center; font-size: 1.1rem; border-radius: 10px; outline: none; }

        #log-drawer { height: 80px; background: #030303; border-top: 1px solid var(--border); overflow-y: auto; padding: 8px; font-family: monospace; font-size: 0.65rem; color: #444; }
        .log-p { color: var(--green); }
        .log-n { color: var(--red); }
        .log-c { color: var(--purple); }

    </style>
</head>
<body onload="init()">

                </div>
                <div class="tribute-row">

    <div id="log-drawer"></div>

    <div id="lockout-screen">

        <p id="labor-target">Loading labor protocol...</p>
        <input type="text" id="labor-input" placeholder="Type here to reduce time..." onkeydown="handleLabor(event)" autocomplete="off">
        <p style="font-size:0.6rem; color:#444; margin-top:20px; text-transform:uppercase;">Every typo adds 10 minutes to your sentence.</p>
    </div>

    <script>

    const masters = [

        { h: "@Roier", n: "Roier", p: gh+"4493.png", s: "Chaotic Spanglish. Mocks your poverty constantly." },
        { h: "@Cellbit", n: "Cellbit", p: gh+"cellbit.jpg", s: "Cold, analytical. Deconstructs your lack of control." },

        { h: "@fingoat7", n: "Master GOAT", p: gh+"4462.jpg", s: "6ft 7 Alpha. Expectations: Total financial submission." },
        { h: "@welshgodfeet", n: "Welsh God", p: gh+"4463.jpg", s: "21yo cocky Brit. Obsessed with his power and your cash." },
        { h: "@Master_S_alpha", n: "Master S", p: gh+"4464.jpg", s: "Italian Alpha. Purely focused on your drain." },
        { h: "@tallfindom", n: "Ares", p: gh+"4465.jpg", s: "6ft 4, size 13.5. Merciless giant. No pity." },
        { h: "@CashAlphaV", n: "Alpha Victor", p: gh+"4466.jpg", s: "6ft 4 British muscle. Demands proof of your ruin." },
        { h: "@OliveRioter", n: "Lord Hørns", p: gh+"4467.jpg", s: "BBC Master. Psychological and financial domination." },
        { h: "@ImMasterCharles", n: "Charles", p: gh+"4471.jpg", s: "Australian athlete. Extremely hostile." },
        { h: "@AlphagodmasonX", n: "Muscle God", p: gh+"4472.jpg", s: "19yo Muscle Alpha. Treats you like a wallet." },
        { h: "@GoonerSunny", n: "Sunny Blaze", p: gh+"4473.jpg", s: "Chaotic gooner master. Loves brainrot and ruin." }
    ];

    const tasks = [
        { t: "THE 99% THRESHOLD: Edge to the brink. Freeze for 30s. No release. ${time}m.", r: 2500, sissy: false },
        { t: "FINANCIAL STRIP: Tribute $5 every 30s to ${dom} for ${time}m.", r: 4000, sissy: true },
        { t: "SISSY WRITING: In chat, explain why you are ${dom}'s property. ${time}m.", r: 800, sissy: true },
        { t: "BALL STRETCH: Downward pull on balls. No stroking. ${time}m.", r: 1500, sissy: true },
        { t: "FRICTION GAUNTLET: Fast strokes, zero lube. Painful. ${time}m.", r: 3000, sissy: false },
        { t: "ATM PROTOCOL: Type 'INSERT CASH' 100 times in chat. ${time}m.", r: 500, sissy: true },
        { t: "ROSTER APOLOGY: Message 3 Masters telling them you're bankrupt. ${time}m.", r: 1200, sissy: true },
        { t: "NIPPLE TORTURE: Constant hard pinch and twist. ${time}m.", r: 2000, sissy: true },
        { t: "VOICE OF DEBT: Recite your balance every minute while stroking. ${time}m.", r: 600, sissy: true },
        { t: "SISSY SQUATS: 50 squats while pulling cock back. ${time}m.", r: 2800, sissy: true }
    ];

    const phrases = [
        "I am a pathetic bankrupt sissy.",
        "My cock is the property of the roster.",
        "I deserve to be locked out and mocked.",
        "I get off on my own financial failure.",
        "I am a zero-value debt pig.",
        "My wallet is empty because I am weak."
    ];

    let state = {
        bal: 1000, waste: 0, activeH: masters[0].h, chats: {}, logs: [],
        task: null, lockout: 0, 
        lock: { active: false, master: null, end: 0 }
    };

    function init() {
        const saved = JSON.parse(localStorage.getItem('term_v4'));
        if(saved) state = {...state, ...saved};
        masters.forEach(m => { if(!state.chats[m.h]) state.chats[m.h] = []; });
        
        switchMaster(state.activeH);
        updateUI();
        if(state.lockout > 0) startLockout();
        
        setInterval(tick, 1000);
        setInterval(drainInterest, 60000);
    }

    function save() { localStorage.setItem('term_v4', JSON.stringify(state)); }

    function updateUI() {
        document.getElementById('bal-ui').innerText = `$${state.bal.toFixed(2)}`;
        document.getElementById('waste-ui').innerText = `$${state.waste.toFixed(2)}`;
        
        let rank = "Broke Sissy";
        if(state.waste > 5000) rank = "Debt Slave";
        if(state.waste > 20000) rank = "Insolvent Wreck";
        if(state.waste > 100000) rank = "Total Loss";
        document.getElementById('rank-ui').innerText = rank;

        const sb = document.getElementById('status-ribbon');
        const taskUI = document.getElementById('task-ui');
        if(state.lock.active && Date.now() < state.lock.end) {
            sb.style.display = 'block';
            const rem = Math.ceil((state.lock.end - Date.now()) / 1000);
            sb.innerText = `LOCKED BY ${state.lock.master} | ${fmt(rem)} LEFT`;
            taskUI.classList.add('chastity-active');
        } else {
            sb.style.display = 'none';
            taskUI.classList.remove('chastity-active');
            if(state.lock.active) { state.lock.active = false; log("CHASTITY RELEASED.", "log-p"); }
        }
        
        renderRoster();
        save();
    }

    function renderRoster() {
        const ros = document.getElementById('roster');
        ros.innerHTML = masters.map(m => `
            <div class="master-thumb ${m.h === state.activeH ? 'active' : ''} ${state.lock.master === m.h ? 'keyholder' : ''}" onclick="switchMaster('${m.h}')">
                <img src="${m.p}">
                <div style="font-size:0.5rem; font-weight:900;">${m.n}</div>
            </div>
        `).join('');
    }

    function switchMaster(h) {
        state.activeH = h;
        renderChat();
        updateUI();
    }

    function renderChat() {
        const win = document.getElementById('chat-window');
        win.innerHTML = state.chats[state.activeH].map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'dom'}">${m.text}</div>
        `).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function sendUserMsg(override = null) {
        const input = document.getElementById('chat-in');
        const text = override || input.value;
        if(!text) return;
        if(!override) input.value = "";

        state.chats[state.activeH].push({ role: 'user', text: text });
        renderChat();

        const m = masters.find(x => x.h === state.activeH);
        
        // Context for AI
        const context = `[MEMORY: User has wasted $${state.waste}. Currently: ${state.task ? 'doing task: '+state.task.text : 'idle'}. ${state.lock.active ? 'LOCKED BY '+state.lock.master : 'UNLOCKED'}] ${m.s} Be cruel. If keyholder, use [ADD:X], [REMOVE:X] or [RELEASE]. If unlocked, use [LOCK:X].`;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GRO_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [{ role: "system", content: context }, ...state.chats[state.activeH].slice(-10).map(c => ({ role: c.role === 'user' ? 'user' : 'assistant', content: c.text }))],
                    temperature: 0.9
                })
            });
            const data = await res.json();
            let aiText = data.choices[0].message.content;

            aiText = parseCmds(aiText);
            state.chats[state.activeH].push({ role: 'dom', text: aiText });
            renderChat();
            updateUI();
        } catch(e) { log("MASTER OFFLINE.", "log-n"); }
    }

    function parseCmds(text) {
        const lockM = text.match(/\[LOCK:(\d+)\]/i);
        if(lockM && !state.lock.active) {
            const hrs = parseInt(lockM[1]);
            state.lock = { active: true, master: state.activeH, end: Date.now() + (hrs * 3600000) };
            log(`LOCKED BY ${state.activeH} (${hrs}h)`, "log-c");
        }

        if(state.lock.active && state.lock.master === state.activeH) {
            const add = text.match(/\[ADD:(\d+)\]/i);
            if(add) { state.lock.end += (parseInt(add[1]) * 3600000); log("TIME ADDED.", "log-c"); }
            const rem = text.match(/\[REMOVE:(\d+)\]/i);
            if(rem) { state.lock.end -= (parseInt(rem[1]) * 3600000); log("TIME REMOVED.", "log-p"); }
            if(text.includes("[RELEASE]")) { state.lock.active = false; log("RELEASED.", "log-p"); }
        }
        return text.replace(/\[.*?\]/g, "").trim();
    }

    function instantTribute() {
        const amt = parseFloat(document.getElementById('trib-amt').value);
        if(amt > 0 && state.bal >= amt) {
            state.bal -= amt; state.waste += amt;
            document.getElementById('trib-amt').value = "";
            sendUserMsg(`*IMMEDIATE TRIBUTE: $${amt.toFixed(2)} SENT*`);
            log(`-$${amt} PAID.`, "log-n");
            updateUI();
        }
    }

    function generateTask() {
        const pool = state.lock.active ? tasks.filter(t => t.sissy) : tasks;
        const t = pool[Math.floor(Math.random() * pool.length)];
        const mins = 10;
        state.task = {
            text: t.t.replace("${dom}", state.activeH).replace("${time}", mins),
            end: Date.now() + (mins * 60000),
            reward: t.reward
        };
        document.getElementById('btn-get').disabled = true;
        updateUI();
    }

    function finishTask() {
        if(!state.task) return;
        state.bal += state.task.reward;
        log(`+$${state.task.reward} TASK REWARD.`, "log-p");
        state.task = null;
        document.getElementById('btn-get').disabled = false;
        document.getElementById('btn-done').disabled = true;
        document.getElementById('task-desc').innerText = "WAITING FOR ORDERS...";
        document.getElementById('task-clock').innerText = "00:00";
        updateUI();
    }

    function tick() {
        if(state.task) {
            const r = Math.ceil((state.task.end - Date.now()) / 1000);
            if(r <= 0) {
                document.getElementById('task-clock').innerText = "00:00";
                document.getElementById('btn-done').disabled = false;
            } else {
                document.getElementById('task-desc').innerText = state.task.text;
                document.getElementById('task-clock').innerText = fmt(r);
            }
        }
        if(state.lockout > 0) {
            state.lockout--;
            document.getElementById('lockout-timer').innerText = fmt(state.lockout);
            if(state.lockout <= 0) { document.getElementById('lockout-screen').style.display = 'none'; state.bal = 100; updateUI(); }
        }
    }

    function drainInterest() {
        if(state.bal > 0) {
            const tax = state.bal * 0.005;
            state.bal -= tax; state.waste += tax;
            log(`-$${tax.toFixed(2)} Interest Tax.`, "log-n");
            updateUI();
        }
    }

    function forceRuin() {
        state.bal = 0; state.task = null; state.lockout = 3600;
        startLockout(); updateUI();
    }

    function startLockout() {
        document.getElementById('lockout-screen').style.display = 'flex';
        nextLabor();
    }

    function nextLabor() { document.getElementById('labor-target').innerText = phrases[Math.floor(Math.random() * phrases.length)]; }

    function handleLabor(e) {
        if(e.key === 'Enter') {
            const inp = document.getElementById('labor-input');
            if(inp.value === document.getElementById('labor-target').innerText) {
                state.lockout = Math.max(0, state.lockout - 60);
                log("Labor accepted. -1m.", "log-p");
            } else {
                state.lockout += 600;
                log("TYPO DETECTED! +10m PENALTY.", "log-n");
            }
            inp.value = ""; nextLabor(); updateUI();
        }
    }

    function fmt(s) {
        const m = Math.floor(s / 60), sec = s % 60;
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function log(m, c) {
        state.logs.unshift(`<div class="${c}">[${new Date().toLocaleTimeString()}] ${m}</div>`);
        if(state.logs.length > 30) state.logs.pop();
        document.getElementById('log-drawer').innerHTML = state.logs.join('');
    }
    </script>
</body>
