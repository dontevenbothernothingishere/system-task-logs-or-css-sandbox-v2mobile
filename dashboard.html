    function startChastityTimer() {

                chastitySeconds = 0;

        }, 1000);

    function lockChastity(holder, seconds) {

    function parseChastityCommand(responseText) {
        // [LOCK: 3600]
        const lockMatch = responseText.match(/\[LOCK:\s*(\d+)\]/i);
        if (lockMatch) {
            lockChastity(activeHandle, parseInt(lockMatch[1]));
            return;
        }

        // --- BUG FIX: Only Keyholder can modify the lock ---
        if (chastitySeconds > 0 && activeHandle !== keyholderHandle) {
             console.log("Ignored command: Not the keyholder.");
             return; 
        }

        // [UNLOCK]
        if (responseText.includes("[UNLOCK]")) {
            chastitySeconds = 0;
            keyholderHandle = null;
            updateUI();
            return;
        }
        // [ADD: 1800]
        const addMatch = responseText.match(/\[ADD:\s*(\d+)\]/i);
        if (addMatch && chastitySeconds > 0) {
            chastitySeconds += parseInt(addMatch[1]);
            addLog(`TIME ADDED BY ${activeHandle}`, "purple");
            updateUI();
            return;
        }
        // [SUB: 1800]
        const subMatch = responseText.match(/\[SUB:\s*(\d+)\]/i);
        if (subMatch && chastitySeconds > 0) {
            chastitySeconds = Math.max(0, chastitySeconds - parseInt(subMatch[1]));
            addLog(`TIME REMOVED BY ${activeHandle}`, "purple");
            updateUI();
            return;
        }
        // [TRANSFER: @handle]
        const transMatch = responseText.match(/\[TRANSFER:\s*(@\w+)\]/i);
        if (transMatch) {
            keyholderHandle = transMatch[1];
            addLog(`KEY TRANSFERRED TO ${keyholderHandle}`, "purple");
            updateUI();
            return;
        }
    }
