<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root {
            --blue: #00a2ff; --red: #ff3131; --gold: #ffcc00; --green: #39ff14;
            --purple: #bc13fe; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a;
            --text: #e0e0e0; --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        @keyframes pulsePurple { 0% { box-shadow: 0 0 5px var(--purple); } 50% { box-shadow: 0 0 25px var(--purple); } 100% { box-shadow: 0 0 5px var(--purple); } }
        .chastity-active { border: 2px solid var(--purple) !important; animation: pulsePurple 2s infinite; }

        /* --- Header & Stats --- */
        .header { 
            background: var(--panel); border-bottom: 2px solid var(--border); 
            display: grid; grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 8px; 
        }
        .stat-card { background: #050505; padding: 10px; border: 1px solid var(--border); border-radius: 5px; }
        .stat-card p { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; font-weight: 900; }
        .stat-card h2 { margin: 0; font-size: 1.1rem; font-family: monospace; }

        /* --- Master Roster --- */
        .nav-roster { 
            display: flex; overflow-x: auto; background: #020202; 
            padding: 10px; gap: 12px; border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .nav-roster::-webkit-scrollbar { display: none; }
        .master-thumb { 
            min-width: 60px; text-align: center; opacity: 0.4; transition: 0.3s; cursor: pointer;
        }
        .master-thumb.active { opacity: 1; transform: scale(1.1); }
        .master-thumb img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; object-fit: cover; }
        .master-thumb.active img { border-color: var(--blue); }
        .master-thumb.keyholder img { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Task Panel --- */
        .task-area { background: #080808; border-bottom: 1px solid var(--border); padding: 15px; text-align: center; }
        #task-desc { color: var(--gold); font-weight: bold; font-size: 0.85rem; min-height: 40px; margin-bottom: 10px; line-height: 1.4; }
        #task-clock { font-size: 2.8rem; font-family: monospace; color: var(--red); font-weight: 900; margin: 5px 0; }
        .task-controls { display: flex; gap: 8px; }
        .task-controls button { 
            flex: 1; padding: 12px; border: none; border-radius: 4px; 
            font-weight: bold; text-transform: uppercase; font-size: 0.7rem; cursor: pointer;
        }
        .btn-order { background: var(--blue); color: #fff; }
        .btn-done { background: var(--green); color: #000; }
        .btn-fail { background: #200; color: var(--red); border: 1px solid #400 !important; }

        /* --- Chat Window --- */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #111; color: #888; border: 1px solid #222; border-bottom-right-radius: 2px; }
        .msg.dom { align-self: flex-start; background: #001a2c; color: #fff; border-left: 4px solid var(--blue); border-bottom-left-radius: 2px; }

        /* --- Input Bar --- */
        .input-box { background: var(--panel); border-top: 1px solid var(--border); padding: 12px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        .tribute-row { display: flex; gap: 8px; align-items: center; }
        #trib-amt { width: 90px; background: #000; border: 1px solid #333; color: var(--green); padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1rem; }
        .btn-trib { flex: 1; background: var(--green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }

        /* --- Lockout System --- */
        #lockout-screen { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 99999; 
            flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        #lockout-timer { font-size: 4rem; font-family: monospace; margin: 20px 0; color: var(--red); text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #labor-target { color: var(--gold); font-style: italic; margin-bottom: 20px; font-size: 1.1rem; background: #111; padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; }
        #labor-input { width: 100%; max-width: 400px; background: #000; border: 2px solid #333; color: #fff; padding: 15px; text-align: center; font-size: 1.1rem; border-radius: 10px; outline: none; }

        #log-drawer { height: 100px; background: #030303; border-top: 2px solid #111; overflow-y: auto; padding: 8px; font-family: monospace; font-size: 0.65rem; color: #444; }
        .log-p { color: var(--green); }
        .log-n { color: var(--red); font-weight: bold; }
        .log-c { color: var(--purple); }
        #status-ribbon { background: var(--purple); color: #fff; font-size: 0.7rem; font-weight: 900; text-align: center; padding: 5px; display: none; text-transform: uppercase; }

    </style>
</head>
