        const d = doms.find(x => x.handle === activeHandle);
        let contextAlert = getAIContextAlert();

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": MODEL_ID, "messages": [{"role": "system", "content": d.persona + contextAlert}, {"role": "user", "content": "I sent $" + amount + ". Consider this when deciding how to punish or reward me."}] })
            });
            const data = await response.json();
            
            let aiText = data.choices[0].message.content;
            aiText = processAICommands(aiText);

            histories[activeHandle].push({ role: 'dom', text: aiText });
            saveAll(); renderMessages();
        } catch (e) {}
    }

    function getTask() {
        // Check for Random Chastity Sentence (25% chance)
        if (!chastityLock.active && Math.random() < 0.25) {
            triggerChastitySentence();
            return;
        }

        const d = doms[Math.floor(Math.random()*doms.length)];
        
        let pool = chastityLock.active ? taskTemplates.filter(t => t.sissySafe) : taskTemplates;
        const t = pool[Math.floor(Math.random()*pool.length)];
        const mins = 10;
        currentTaskObj = { handle: d.handle, endTime: Date.now() + (mins*60*1000), reward: t.reward, text: t.text.replace("${dom}", d.handle).replace("${time}", mins) };
        document.getElementById('task-display').innerText = currentTaskObj.text;
        document.getElementById('gen-btn').disabled = true;
        document.body.classList.add('ruining-active');
        startTimer(mins * 60);
        saveAll();
    }

    function triggerChastitySentence() {
        const d = doms[Math.floor(Math.random()*doms.length)];
        const hours = Math.floor(Math.random() * 24) + 1;
        chastityLock = {
            active: true,
            keyholder: d.handle,
            endTime: Date.now() + (hours * 60 * 60 * 1000)
        };
        addLog(`VIRTUAL LOCKDOWN: ${d.handle} HAS TAKEN YOUR KEY FOR ${hours} HOURS.`, "chastity");
        document.getElementById('task-display').innerText = `🔒 LOCKED BY ${d.handle}. ONLY SISSY-SAFE TASKS ALLOWED.`;
        checkChastityStatus();
        saveAll();
    }

    function resumeTask() {
        const remain = Math.floor((currentTaskObj.endTime - Date.now()) / 1000);
        if (remain > 0) {
            document.getElementById('task-display').innerText = currentTaskObj.text;
            document.getElementById('gen-btn').disabled = true;
            startTimer(remain);
        } else {
            document.getElementById('comp-btn').disabled = false;
            document.getElementById('timer').innerText = "00:00";
        }
    }

    function startTimer(sec) {
        clearInterval(timer);
        timer = setInterval(() => {
            if(sec <= 0) { 
                clearInterval(timer); 
                document.getElementById('comp-btn').disabled = false; 
                document.getElementById('timer').innerText = "00:00";
                return; 
            }
            sec--; let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            checkChastityStatus(); 
        }, 1000);
    }

    function completeTask() {
        balance += currentTaskObj.reward;
        addLog(`+$${currentTaskObj.reward} REWARD`, "positive");
        currentTaskObj = null; updateUI();
        document.getElementById('gen-btn').disabled = false;
        document.getElementById('comp-btn').disabled = true;
        document.body.classList.remove('ruining-active');
        document.getElementById('task-display').innerText = "SYSTEM READY.";
        saveAll();
    }

    function triggerTotalRuin() {
        balance = 0; 
        if(chastityLock.active) {
            addLog("LOCK BROKEN. TOTAL SYSTEM RESET.", "negative");
            chastityLock.active = false;
        }
        showLockout(); 
        updateUI();
    }

    function showLockout(resume = false) {
        document.getElementById('lockout').style.display = 'flex';
        if(!resume) lockoutSeconds = 3600;
        clearInterval(lockoutTimer);
        lockoutTimer = setInterval(() => {
            lockoutSeconds--; saveAll();
            if(lockoutSeconds <= 0) {
                clearInterval(lockoutTimer); document.getElementById('lockout').style.display = 'none';
                balance = 1000; updateUI();
            }
            let m = Math.floor(lockoutSeconds/60), s = lockoutSeconds%60;
            document.getElementById('work-clock').innerText = `00:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function checkLabor(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('labor-input');
            const target = document.getElementById('phrase-to-type').innerText;
            if (input.value === target) {
                linesDone++;
                lockoutSeconds = Math.max(0, lockoutSeconds - 60);
                document.getElementById('phrase-to-type').innerText = laborPhrases[Math.floor(Math.random() * laborPhrases.length)];
                addLog("LABOR PROCESSED: -1m", "positive");
            } else {
                lockoutSeconds += 120;
                addLog("LABOR ERROR: +2m ADDED", "negative");
            }
            input.value = ""; 
            document.getElementById('labor-stats').innerText = `Lines Processed: ${linesDone}`;
            saveAll();
        }
    }

    function addLog(m, t) {
        logs.unshift({ msg: `[${new Date().toLocaleTimeString()}] ${m}`, type: t });
        renderLogs();
    }

    function renderLogs() {
        document.getElementById('log-content').innerHTML = logs.map(l => `<div class="log-entry ${l.type}">${l.msg}</div>`).join('');
    }
    </script>
</body>
</html>
