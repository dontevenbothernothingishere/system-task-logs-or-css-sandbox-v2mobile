<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL: MOBILE RUIN v3.0</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --bg: #000; --panel: #0d0d0d; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* --- Header Stats --- */
        .top-stats {
            background: var(--panel); border-bottom: 1px solid #222;
            display: grid; grid-template-columns: repeat(3, 1fr);
            padding: 10px; text-align: center;
        }
        .stat p { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; font-weight: bold; }
        .stat h2 { margin: 0; font-size: 0.9rem; font-family: monospace; }

        /* --- View Container --- */
        .view-layer { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .view-layer.active { display: flex; }

        /* --- View 1: Roster --- */
        #view-roster { overflow-y: auto; background: #050505; }
        .roster-item { 
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; 
            transition: 0.2s; cursor: pointer;
        }
        .roster-item img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 1px solid #333; }
        .roster-item.active { background: #0d1926; border-left: 4px solid var(--blue); }

        /* --- View 2: Chat --- */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #1a1a1a; color: #888; border: 1px solid #222; }
        .dom-msg { align-self: flex-start; background: #001a2c; border-left: 3px solid var(--blue); color: #eee; }
        
        .chat-input-area { background: var(--panel); border-top: 1px solid #222; padding: 10px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; }
        .tribute-row { display: flex; gap: 8px; }
        #trib-amt { width: 80px; background: #000; border: 1px solid #333; color: var(--green); text-align: center; border-radius: 8px; font-weight: bold; }

        /* --- View 3: Terminal --- */
        #view-terminal { padding: 20px; text-align: center; justify-content: center; }
        #task-box { 
            background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 15px; 
            min-height: 180px; display: flex; align-items: center; color: var(--gold); font-weight: bold;
        }
        #timer { font-size: 4.5rem; font-family: monospace; color: var(--red); margin: 20px 0; }
        .btn { 
            width: 100%; padding: 18px; border-radius: 10px; border: none; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 10px; font-size: 0.9rem;
        }

        /* --- Navigation --- */
        .bottom-nav {
            background: var(--panel); border-top: 1px solid #222;
            display: flex; height: 65px;
        }
        .nav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #555; font-size: 0.6rem; font-weight: bold; text-decoration: none;
        }
        .nav-btn.active { color: var(--blue); }
        .nav-btn i { font-size: 1.2rem; margin-bottom: 4px; }

        /* --- Lockout --- */
        #lockout { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 10000; 
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #work-clock { font-size: 3.5rem; color: var(--red); font-family: monospace; }
        #labor-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 15px; }

        @keyframes pulseRed { 0% { box-shadow: inset 0 0 10px #f00; } 50% { box-shadow: inset 0 0 50px #f00; } 100% { box-shadow: inset 0 0 10px #f00; } }
        .active-task-mode { animation: pulseRed 2s infinite; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="init()">

    <div class="top-stats">
        <div class="stat"><p>Status</p><h2 id="sub-rank" style="color:var(--gold)">NULL</h2></div>
        <div class="stat"><p>Balance</p><h2 id="bal" style="color:var(--blue)">$0</h2></div>
        <div class="stat"><p>Debt</p><h2 id="waste" style="color:var(--red)">$0</h2></div>
    </div>

    <div id="view-roster" class="view-layer active">
        <div style="padding:15px; font-size: 0.7rem; color:#444; font-weight: bold; border-bottom: 1px solid #222;">ACTIVE ROSTER</div>
        <div id="roster-list"></div>
    </div>

    <div id="view-chat" class="view-layer">
        <div id="chat-header" style="padding:12px; background: #050505; border-bottom:1px solid #222; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center;"></div>
        <div id="chat-window"></div>
        <div class="chat-input-area">
            <div class="input-row">
                <input type="text" id="chat-in" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">
                <button onclick="sendChat()" style="background:var(--blue); border:none; padding:0 15px; border-radius:8px; color:#fff;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
            <div class="tribute-row">
                <input type="number" id="trib-amt" placeholder="$">
                <button onclick="handleCustomTribute()" style="flex:1; background:var(--green); border:none; color:#fff; font-weight: bold; border-radius: 8px; padding: 10px;">DIRECT TRIBUTE</button>
            </div>
        </div>
    </div>

    <div id="view-terminal" class="view-layer">
        <div id="task-box">SYSTEM READY...</div>
        <div id="timer">00:00</div>
        <button id="gen-btn" class="btn" style="background:var(--blue); color:#fff;" onclick="getTask()">RECEIVE ORDER</button>
        <button id="comp-btn" class="btn" style="background:#222; color:#555;" onclick="completeTask()" disabled>LOCKED</button>
        <button id="ruin-btn" class="btn" style="background:#1a0000; color:var(--red); border:1px solid #300;" onclick="triggerTotalRuin()">I FAILED / RUINED IT</button>
    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-btn active" onclick="showView('roster', this)"><i class="fa-solid fa-users"></i>ROSTER</a>
        <a href="javascript:void(0)" class="nav-btn" onclick="showView('chat', this)"><i class="fa-solid fa-comment"></i>CHAT</a>
        <a href="javascript:void(0)" class="nav-btn" onclick="showView('terminal', this)"><i class="fa-solid fa-terminal"></i>TERMINAL</a>
    </nav>

    <div id="lockout">
        <h1 style="color:red; letter-spacing: 5px;">INSOLVENT</h1>
        <div id="work-clock">01:00:00</div>
        <p id="phrase-to-type" style="color:var(--gold); font-family:monospace; text-align: center; margin-top: 20px;">I am a bankrupt sissy...</p>
        <input type="text" id="labor-input" placeholder="Type precisely..." onkeydown="checkLabor(event)">
        <p id="labor-stats" style="color:#444; font-size: 0.7rem; margin-top: 10px;">Lines: 0</p>
    </div>

    <script>
        // Keep your existing API logic and constants exactly as they are
        const GROQ_API_KEY = "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";
        const MODEL_ID = "llama-3.3-70b-versatile"; 
        const ghBase = "https://cdn.jsdelivr.net/gh/dontevenbothernothingishere/system-task-logs-or-css-sandbox-v2@main/";

        const doms = [
            { handle: "@Sapnap", name: "Sapnap", pfp: ghBase + "4491.png", persona: "Arrogant Master." },
            { handle: "@RossLynch", name: "Ross Lynch", pfp: ghBase + "4489.png", persona: "Cold Hollywood Alpha." },
            { handle: "@Roier", name: "Roier", pfp: ghBase + "4493.png", persona: "Chaotic Spanglish master." },
            { handle: "@Cellbit", name: "Cellbit", pfp: ghBase + "cellbit.jpg", persona: "Cold investigator." },
            { handle: "@Quackity", name: "Quackity", pfp: ghBase + "quackity.jpg", persona: "Aggressive, mocking." },
            { handle: "@fingoat7", name: "Master GOAT", pfp: ghBase + "4462.jpg", persona: "Alpha Master." },
            { handle: "@welshgodfeet", name: "welshgodfeet", pfp: ghBase + "4463.jpg", persona: "Cocky Brit." },
            { handle: "@Master_S_alpha", name: "Master S", pfp: ghBase + "4464.jpg", persona: "Italian cashmaster." },
            { handle: "@tallfindom", name: "Ares", pfp: ghBase + "4465.jpg", persona: "Ares the Giant." },
            { handle: "@CashAlphaV", name: "Alpha V", pfp: ghBase + "4466.jpg", persona: "English muscle." },
            { handle: "@OliveRioter", name: "Lord Hørns", pfp: ghBase + "4467.jpg", persona: "BBC Master." },
            { handle: "@CashAlphaVictor", name: "Alpha Victor", pfp: ghBase + "4470.jpg", persona: "British athlete." },
            { handle: "@ImMasterCharles", name: "Master Charles", pfp: ghBase + "4471.jpg", persona: "Australian Alpha." },
            { handle: "@AlphagodmasonX", name: "Muscle God", pfp: ghBase + "4472.jpg", persona: "Muscle Alpha." },
            { handle: "@GoonerSunny", name: "Sunny Blaze", pfp: ghBase + "4473.jpg", persona: "Chaotic gooner." }
        ];

        // [Logic remains largely the same, just targeting mobile UI elements]
        let balance, wasted, activeHandle, histories, currentTaskObj, lockoutSeconds, timer, lockoutTimer;

        function init() {
            balance = parseFloat(localStorage.getItem('fakeBalance')) || 1000;
            wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
            activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;
            histories = JSON.parse(localStorage.getItem('chats')) || {};
            currentTaskObj = JSON.parse(localStorage.getItem('currentTask')) || null;
            lockoutSeconds = parseInt(localStorage.getItem('lockoutTime')) || 0;
            
            doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
            
            updateUI();
            renderRoster();
            switchChat(activeHandle);
            if(lockoutSeconds > 0) showLockout(true);
            if(currentTaskObj) resumeTask();
        }

        function showView(viewId, btn) {
            document.querySelectorAll('.view-layer').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
        }

        function switchChat(handle) {
            activeHandle = handle;
            const d = doms.find(x => x.handle === handle);
            document.getElementById('chat-header').innerHTML = `<img src="${d.pfp}" style="width:30px;height:30px;border-radius:50%;margin-right:10px;"> ${d.name}`;
            renderRoster();
            renderMessages();
            localStorage.setItem('activeHandle', activeHandle);
        }

        function renderRoster() {
            document.getElementById('roster-list').innerHTML = doms.map(d => `
                <div class="roster-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}'); showView('chat', document.querySelectorAll('.nav-btn')[1])">
                    <img src="${d.pfp}">
                    <div><strong>${d.name}</strong><br><small style="color:#444">${d.handle}</small></div>
                </div>`).join('');
        }

        // --- Core Functions (Direct Port from Desktop) ---
        function updateUI() {
            document.getElementById('bal').innerText = `$${Math.floor(balance)}`;
            document.getElementById('waste').innerText = `$${Math.floor(wasted)}`;
            document.getElementById('sub-rank').innerText = wasted > 10000 ? "INSOLVENT" : "SISSY";
            localStorage.setItem('fakeBalance', balance);
            localStorage.setItem('totalWasted', wasted);
            localStorage.setItem('lockoutTime', lockoutSeconds);
        }

        function renderMessages() {
            const box = document.getElementById('chat-window');
            box.innerHTML = (histories[activeHandle] || []).map(m => `<div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chat-in');
            if(!input.value) return;
            const text = input.value;
            histories[activeHandle].push({ role: 'user', text: text });
            input.value = ""; renderMessages();
            
            const d = doms.find(x => x.handle === activeHandle);
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": MODEL_ID, "messages": [{"role": "system", "content": d.persona}, {"role": "user", "content": text}] })
                });
                const data = await response.json();
                histories[activeHandle].push({ role: 'dom', text: data.choices[0].message.content });
                renderMessages(); localStorage.setItem('chats', JSON.stringify(histories));
            } catch(e) {}
        }

        function handleCustomTribute() {
            const val = parseFloat(document.getElementById('trib-amt').value);
            if(val > 0 && balance >= val) {
                balance -= val; wasted += val;
                histories[activeHandle].push({ role: 'user', text: `*TRIBUTE: $${val}*` });
                updateUI(); renderMessages(); document.getElementById('trib-amt').value = "";
            }
        }

        function getTask() {
            // [Task logic from desktop]
            const d = doms[Math.floor(Math.random()*doms.length)];
            currentTaskObj = { handle: d.handle, endTime: Date.now() + (600000), reward: 1000, text: "THE 'SISSY' STROKE: No full grips for 10m." };
            document.getElementById('task-box').innerText = currentTaskObj.text;
            document.getElementById('gen-btn').disabled = true;
            document.body.classList.add('active-task-mode');
            startTimer(600);
            localStorage.setItem('currentTask', JSON.stringify(currentTaskObj));
        }

        function startTimer(sec) {
            clearInterval(timer);
            timer = setInterval(() => {
                if(sec <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
                sec--; let m = Math.floor(sec/60), s = sec%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        function triggerTotalRuin() {
            balance = 0; showLockout(); updateUI();
        }

        function showLockout(resume = false) {
            document.getElementById('lockout').style.display = 'flex';
            if(!resume) lockoutSeconds = 3600;
            clearInterval(lockoutTimer);
            lockoutTimer = setInterval(() => {
                lockoutSeconds--; 
                if(lockoutSeconds <= 0) { clearInterval(lockoutTimer); document.getElementById('lockout').style.display = 'none'; balance = 500; updateUI(); }
                let m = Math.floor(lockoutSeconds/60), s = lockoutSeconds%60;
                document.getElementById('work-clock').innerText = `00:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }
    </script>
</body>
</html>
