<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --bg: #000; --panel: #0a0a0a; --purple: #a333ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 10px #f00; } 50% { box-shadow: inset 0 0 100px #f00; } 100% { box-shadow: inset 0 0 10px #f00; } }
        .ruining-active { animation: pulseRed 2s infinite; }
        
        @keyframes pulsePurple { 0% { box-shadow: inset 0 0 10px var(--purple); } 50% { box-shadow: inset 0 0 40px var(--purple); } 100% { box-shadow: inset 0 0 10px var(--purple); } }
        .chastity-active { animation: pulsePurple 3s infinite; border: 1px solid var(--purple) !important; }

        .top-bar { background: var(--panel); border-bottom: 1px solid #222; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-wrap: wrap; }
        .stat h2 { margin: 0; font-family: monospace; font-size: 1.2rem; }
        .stat p { margin: 0; font-size: 0.55rem; color: #666; text-transform: uppercase; }

        .main-container { display: grid; grid-template-columns: 250px 300px 1fr 350px; flex-grow: 1; overflow: hidden; }
        
        .burn-log { background: #030303; border-right: 1px solid #222; overflow-y: auto; font-family: monospace; font-size: 0.7rem; padding: 10px; color: #444; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-entry.negative { color: var(--red); }
        .log-entry.positive { color: #0f0; }
        .log-entry.chastity { color: var(--purple); font-weight: bold; }

        .inbox { background: #050505; border-right: 1px solid #222; overflow-y: auto; }
        .inbox-item { padding: 10px; border-bottom: 1px solid #111; cursor: pointer; border-left: 4px solid transparent; display: flex; align-items: center; }
        .inbox-item img { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        .inbox-item.active { background: #0d1926; border-left-color: var(--blue); }
        
        .chat-section { display: flex; flex-direction: column; border-right: 1px solid #222; position: relative; height: 100%; overflow: hidden; }
        #chat-box { flex-grow: 1; padding: 15px; overflow-y: scroll; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        .msg { max-width: 85%; padding: 10px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: #111; color: #999; border: 1px solid #222; }
        .dom-msg { align-self: flex-start; background: #001a2c; border-left: 3px solid var(--blue); color: #fff; }
        
        .command-panel { background: #050505; padding: 15px; display: flex; flex-direction: column; text-align: center; }
        #task-display { font-size: 0.95rem; font-weight: bold; color: var(--gold); background: #111; padding: 12px; border-radius: 8px; min-height: 100px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        #timer { font-size: 3.5rem; font-family: monospace; color: var(--red); margin: 10px 0; }
        
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        #gen-btn { background: var(--blue); color: #fff; }
        #comp-btn { background: #222; color: #444; }
        #ruin-btn { background: #1a0000; color: #600; border: 1px solid #300; font-size: 0.6rem; }
        
        #lockout { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        @media (max-width: 900px) {
            .main-container { display: flex; flex-direction: column; overflow-y: auto; }
            .inbox { display: flex; flex-direction: row; overflow-x: auto; min-height: 80px; border-right: none; border-bottom: 1px solid #222; }
            .inbox-item { min-width: 140px; flex-direction: column; text-align: center; border-left: none; border-bottom: 3px solid transparent; }
            .inbox-item.active { border-bottom-color: var(--blue); }
            .inbox-item img { margin-right: 0; margin-bottom: 5px; }
            .chat-section { height: 50vh; order: 2; }
            .command-panel { order: 1; }
            .burn-log { height: 150px; order: 3; border-right: none; border-top: 1px solid #222; }
        }
    </style>
</head>
<body onload="init()">

        <input type="text" id="labor-input" style="width:100%; padding:12px; background:#111; color:#fff; border:1px solid #333; text-align:center;" onkeydown="checkLabor(event)">
    </div>

    <script>

    const laborPhrases = ["I am a bankrupt sissy.", "My cock belongs to the roster.", "I deserve to be locked out.", "Submission is my only purpose."];
    const ranks = [{ name: "BROKE SISSY", threshold: 0 }, { name: "DEBT SLAVE", threshold: 1000 }, { name: "TOTAL LOSS", threshold: 10000 }];

    let balance, wasted, activeHandle, histories, logs, currentTaskObj, lockoutSeconds, chastityLock, timer, lockoutTimer;

    function init() {

        wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
        activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;
        histories = JSON.parse(localStorage.getItem('chats')) || {};
        logs = JSON.parse(localStorage.getItem('burnLogs')) || [];
        currentTaskObj = JSON.parse(localStorage.getItem('currentTask')) || null;
        lockoutSeconds = parseInt(localStorage.getItem('lockoutTime')) || 0;
        chastityLock = JSON.parse(localStorage.getItem('chastityLock')) || { active: false, keyholder: null, endTime: 0 };
        doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
        switchChat(activeHandle); updateUI(); renderLogs(); checkChastityStatus();
        if (lockoutSeconds > 0) showLockout(true);
        if (currentTaskObj) resumeTask();
    }

    function saveAll() {
        localStorage.setItem('fakeBalance', balance); localStorage.setItem('totalWasted', wasted);
        localStorage.setItem('chats', JSON.stringify(histories)); localStorage.setItem('burnLogs', JSON.stringify(logs));
        localStorage.setItem('activeHandle', activeHandle); localStorage.setItem('currentTask', JSON.stringify(currentTaskObj));
        localStorage.setItem('lockoutTime', lockoutSeconds); localStorage.setItem('chastityLock', JSON.stringify(chastityLock));
    }

    function updateUI() {
        document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
        document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
        let rName = ranks[0].name; ranks.forEach(r => { if(wasted >= r.threshold) rName = r.name; });
        document.getElementById('sub-rank').innerText = "RANK: " + rName;
        saveAll();

    function switchChat(handle) {
        activeHandle = handle; 
        const d = doms.find(x => x.handle === handle);
        document.getElementById('chat-header').innerHTML = `<img src="${d.pfp}" style="width:30px;height:30px;border-radius:50%;margin-right:10px;">${d.name}`;
        renderInbox(); renderMessages(); saveAll();
    }

    function renderInbox() {
        document.getElementById('inbox-list').innerHTML = doms.map(d => `<div class="inbox-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}')"><img src="${d.pfp}"><span>${d.name}</span></div>`).join('');
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = (histories[activeHandle] || []).map(m => `<div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendChat(specialText = null) {
        const input = document.getElementById('chat-in');
        const text = specialText || input.value;
        if(!text) return;
        if(!specialText) input.value = "";
        histories[activeHandle].push({ role: 'user', text: text });
        renderMessages();
        const d = doms.find(x => x.handle === activeHandle);
        let taskCtx = currentTaskObj ? `User is doing: ${currentTaskObj.text}` : "User is idle.";
        let cCtx = chastityLock.active ? (chastityLock.keyholder === activeHandle ? "You hold their key. [ADD:X] or [REMOVE:X] to change time." : `Locked by ${chastityLock.keyholder}`) : "Unlocked. [LOCK:X] to lock.";
        const memory = histories[activeHandle].slice(-10).map(m => ({"role": m.role === 'user' ? 'user' : 'assistant', "content": m.text}));

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": MODEL_ID, "messages": [{"role": "system", "content": d.persona + `\n${taskCtx}\n${cCtx}\nBE HUMAN. MOODY.`}, ...memory], "temperature": 0.88 })
            });
            const data = await response.json();
            let aiText = processAICommands(data.choices[0].message.content);
            histories[activeHandle].push({ role: 'dom', text: aiText });
            saveAll(); renderMessages();
        } catch (e) { addLog("Master Offline", "negative"); }
    }

    function handleCustomTribute() {
        const val = parseFloat(document.getElementById('tribute-amount').value);
        if (val > 0 && balance >= val) { balance -= val; wasted += val; updateUI(); sendChat(`*TRIBUTE: $${val}*`); document.getElementById('tribute-amount').value = ''; }
    }

    function processAICommands(aiText) {
        const lockMatch = aiText.match(/\[LOCK:(\d+)\]/i);
        if (lockMatch && !chastityLock.active) {
            chastityLock = { active: true, keyholder: activeHandle, endTime: Date.now() + (parseInt(lockMatch[1]) * 3600000) };
            addLog(`LOCKED BY ${activeHandle}`, "chastity");
            aiText = aiText.replace(/\[LOCK:\d+\]/ig, '');
        }
        if (chastityLock.active && chastityLock.keyholder === activeHandle) {
            const addMatch = aiText.match(/\[ADD:(\d+)\]/i);
            if (addMatch) { chastityLock.endTime += (parseInt(addMatch[1]) * 3600000); addLog(`TIME ADDED`, "chastity"); aiText = aiText.replace(/\[ADD:\d+\]/ig, ''); }
            const remMatch = aiText.match(/\[REMOVE:(\d+)\]/i);
            if (remMatch) { chastityLock.endTime -= (parseInt(remMatch[1]) * 3600000); addLog(`TIME REMOVED`, "positive"); aiText = aiText.replace(/\[REMOVE:\d+\]/ig, ''); }
        }
        checkChastityStatus(); return aiText;
    }

    function checkChastityStatus() {
        const effects = document.getElementById('status-effects');
        const now = Date.now();
        if (chastityLock.active && now < chastityLock.endTime) {
            const remain = Math.ceil((chastityLock.endTime - now) / 60000);
            effects.innerHTML = `<span style="background:var(--purple); padding:3px 8px; border-radius:4px; font-size:0.7rem;">🔒 ${remain}m</span>`;
            document.getElementById('task-display').classList.add('chastity-active');
        } else {
            if(chastityLock.active) addLog("FREE", "positive");
            chastityLock.active = false; effects.innerHTML = "";
            document.getElementById('task-display').classList.remove('chastity-active');
        }
    }

    function getTask() {
        const pool = chastityLock.active ? taskTemplates.filter(t => t.sissySafe) : taskTemplates;
        const t = pool[Math.floor(Math.random()*pool.length)];
        currentTaskObj = { handle: activeHandle, endTime: Date.now() + 600000, reward: t.reward, text: t.text.replace("${dom}", activeHandle).replace("${time}", 10) };
        document.getElementById('task-display').innerText = currentTaskObj.text;
        document.getElementById('gen-btn').disabled = true; startTimer(600); saveAll();
    }

    function startTimer(sec) {
        clearInterval(timer);
        timer = setInterval(() => {
            if(sec <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
            sec--; let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function completeTask() {
        balance += currentTaskObj.reward; addLog(`+$${currentTaskObj.reward}`, "positive");
        currentTaskObj = null; document.getElementById('gen-btn').disabled = false;
        document.getElementById('comp-btn').disabled = true;
        document.getElementById('task-display').innerText = "SYSTEM READY"; updateUI();
    }

    function triggerTotalRuin() {
        balance = 0; chastityLock.active = false; showLockout(); updateUI();
    }

    function showLockout(resume = false) {
        document.getElementById('lockout').style.display = 'flex';
        if(!resume) lockoutSeconds = 3600;
        document.getElementById('phrase-to-type').innerText = laborPhrases[0];
        clearInterval(lockoutTimer);
        lockoutTimer = setInterval(() => {
            lockoutSeconds--; saveAll();
            if(lockoutSeconds <= 0) { document.getElementById('lockout').style.display = 'none'; clearInterval(lockoutTimer); balance = 1000; updateUI(); }
            document.getElementById('work-clock').innerText = lockoutSeconds;
        }, 1000);
    }

    function checkLabor(e) {
        if(e.key === 'Enter') {
            const input = document.getElementById('labor-input');
            if(input.value === document.getElementById('phrase-to-type').innerText) {
                lockoutSeconds = Math.max(0, lockoutSeconds - 120);
                document.getElementById('phrase-to-type').innerText = laborPhrases[Math.floor(Math.random()*laborPhrases.length)];
            } else { lockoutSeconds += 300; }
            input.value = "";
        }
    }

    function addLog(m, t) {
        logs.unshift({ msg: m, type: t });
        document.getElementById('log-content').innerHTML = logs.map(l => `<div class="log-entry ${l.type}">${l.msg}</div>`).join('');
    }

    function resumeTask() {
        let rem = Math.floor((currentTaskObj.endTime - Date.now()) / 1000);
        if(rem > 0) { document.getElementById('task-display').innerText = currentTaskObj.text; document.getElementById('gen-btn').disabled = true; startTimer(rem); }
    }
    </script>
</body>
