        .top-bar { background: var(--panel); border-bottom: 1px solid #222; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .stat h2 { margin: 0; font-family: monospace; font-size: 1.8rem; }
        .stat p { margin: 0; font-size: 0.65rem; color: #666; text-transform: uppercase; }

        .nav-links { background: #050505; border-bottom: 1px solid #222; padding: 10px 25px; display: flex; gap: 20px; font-family: monospace; font-size: 0.85rem; }

        .inbox { background: #050505; border-right: 1px solid #222; overflow-y: auto; }
        .inbox-item { padding: 12px; border-bottom: 1px solid #111; cursor: pointer; border-left: 4px solid transparent; display: flex; align-items: center; transition: 0.2s; }
        .inbox-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 1px solid #333; }

        .chat-section { display: flex; flex-direction: column; border-right: 1px solid #222; position: relative; height: 100%; overflow: hidden; }

        #tribute-amount { width: 80px; background: #000; border: 1px solid #333; color: var(--green); padding: 12px; font-weight: bold; text-align: center; outline: none; }

    function init() {
        balance = parseFloat(localStorage.getItem('fakeBalance')) || 1000;
        wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
        activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;
        histories = JSON.parse(localStorage.getItem('chats')) || {};
        logs = JSON.parse(localStorage.getItem('burnLogs')) || [];
        currentTaskObj = JSON.parse(localStorage.getItem('currentTask')) || null;
        lockoutSeconds = parseInt(localStorage.getItem('lockoutTime')) || 0;
        chastityLock = JSON.parse(localStorage.getItem('chastityLock')) || { active: false, keyholder: null, endTime: 0 };

        doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
        
        switchChat(activeHandle); 
        updateUI(); renderLogs(); checkChastityStatus();
        if (lockoutSeconds > 0) showLockout(true);
        if (currentTaskObj) resumeTask();

    function saveAll() {
        localStorage.setItem('fakeBalance', balance);
        localStorage.setItem('totalWasted', wasted);
        localStorage.setItem('chats', JSON.stringify(histories));
        localStorage.setItem('burnLogs', JSON.stringify(logs));
        localStorage.setItem('activeHandle', activeHandle);
        localStorage.setItem('currentTask', JSON.stringify(currentTaskObj));
        localStorage.setItem('lockoutTime', lockoutSeconds);
        localStorage.setItem('chastityLock', JSON.stringify(chastityLock));
    }

    function updateUI() {
        document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
        document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
        let currentRank = ranks[0].name;
        ranks.forEach(r => { if(wasted >= r.threshold) currentRank = r.name; });
        document.getElementById('sub-rank').innerText = "RANK: " + currentRank;

    function switchChat(handle) {
        activeHandle = handle; 
        const d = doms.find(x => x.handle === handle);
        document.getElementById('chat-header').innerHTML = `<img src="${d.pfp}" style="width:35px;height:35px;border-radius:50%;margin-right:12px;"><span>${d.name}</span>`;
        renderInbox(); renderMessages(); saveAll();
    }

    function renderInbox() {
        document.getElementById('inbox-list').innerHTML = doms.map(d => `
            <div class="inbox-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}')">
                <img src="${d.pfp}"><div><strong>${d.name}</strong></div>
            </div>`).join('');
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = (histories[activeHandle] || []).map(m => `
            <div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function getAIContextAlert() {
        let taskText = currentTaskObj ? `User is currently doing: ${currentTaskObj.text}` : "User is IDLE.";
        let cStatus = "UNLOCKED.";
        if (chastityLock.active) {
            cStatus = chastityLock.keyholder === activeHandle ? `LOCKED BY YOU until ${new Date(chastityLock.endTime).toLocaleTimeString()}. Use [ADD:X] or [REMOVE:X] sparingly.` : `LOCKED by ${chastityLock.keyholder}.`;
        } else {
            cStatus = "UNLOCKED. Use [LOCK:X] to lock them (X=hours). Only use if they annoy you or send a bad tribute.";
        }

        return `\n\n[CONTEXT: ${taskText} | CHASTITY: ${cStatus} | Respond like a real person. Be moody/unpredictable. Do not repeat phrases.]`;
    }

    async function sendChat(specialText = null) {
        const input = document.getElementById('chat-in');
        const text = specialText || input.value;
        if(!text) return;
        if(!specialText) input.value = "";

        histories[activeHandle].push({ role: 'user', text: text });
        renderMessages();

        const d = doms.find(x => x.handle === activeHandle);
        const context = getAIContextAlert();
        // Get last 10 messages for memory
        const memory = histories[activeHandle].slice(-10).map(m => ({"role": m.role === 'user' ? 'user' : 'assistant', "content": m.text}));

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },

                    "model": MODEL_ID, 
                    "messages": [
                        {"role": "system", "content": d.persona + context},
                        ...memory
                    ],
                    "temperature": 0.88

            });
            const data = await response.json();
            let aiText = data.choices[0].message.content;

            aiText = processAICommands(aiText);
            histories[activeHandle].push({ role: 'dom', text: aiText });
            saveAll(); renderMessages();
        } catch (e) { addLog("Master unreachable...", "negative"); }
    }

    function handleCustomTribute() {
        const val = parseFloat(document.getElementById('tribute-amount').value);
        if (val > 0 && balance >= val) {
            balance -= val; wasted += val; updateUI();
            sendChat(`*TRIBUTE: $${val}*`);
            document.getElementById('tribute-amount').value = '';

    }

    function processAICommands(aiText) {
        const lockMatch = aiText.match(/\[LOCK:(\d+)\]/i);
        if (lockMatch && !chastityLock.active) {
            chastityLock = { active: true, keyholder: activeHandle, endTime: Date.now() + (parseInt(lockMatch[1]) * 3600000) };
            addLog(`LOCKED BY ${activeHandle}`, "chastity");
            aiText = aiText.replace(/\[LOCK:\d+\]/ig, '');
        }
        if (chastityLock.active && chastityLock.keyholder === activeHandle) {
            const addMatch = aiText.match(/\[ADD:(\d+)\]/i);
            if (addMatch) {
                chastityLock.endTime += (parseInt(addMatch[1]) * 3600000);
                addLog(`TIME ADDED`, "chastity");
                aiText = aiText.replace(/\[ADD:\d+\]/ig, '');
            }
            const remMatch = aiText.match(/\[REMOVE:(\d+)\]/i);
            if (remMatch) {
                chastityLock.endTime -= (parseInt(remMatch[1]) * 3600000);
                addLog(`TIME REMOVED`, "positive");
                aiText = aiText.replace(/\[REMOVE:\d+\]/ig, '');
            }
        }
        checkChastityStatus();
        return aiText;
    }

    function checkChastityStatus() {

            chastityLock.active = false;
            effects.innerHTML = "";
            document.getElementById('task-display').classList.remove('chastity-active');

        saveAll();

    function getTask() {

    function startTimer(sec) {
        clearInterval(timer);
        timer = setInterval(() => {
            if(sec <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
            sec--; let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;

    function showLockout(resume = false) {
        document.getElementById('lockout').style.display = 'flex';

        clearInterval(lockoutTimer);
        lockoutTimer = setInterval(() => {
            lockoutSeconds--; saveAll();
            if(lockoutSeconds <= 0) { document.getElementById('lockout').style.display = 'none'; clearInterval(lockoutTimer); }
            document.getElementById('work-clock').innerText = lockoutSeconds;
        }, 1000);
    }

    function addLog(m, t) {
        logs.unshift({ msg: m, type: t });
        renderLogs();
    }

    function renderLogs() {
        document.getElementById('log-content').innerHTML = logs.map(l => `<div class="log-entry ${l.type}">${l.msg}</div>`).join('');
