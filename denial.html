<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DENIAL CHAMBER | PROPERTY #16-F</title>
    <style>
        :root {
            --roster-red: #ff0000;
            --terminal-green: #00ff41;
            --bg-dark: #050505;
            --dim-gray: #1a1a1a;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--roster-red);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px var(--roster-red);
        }

        /* Scanline/CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #chamber-ui {
            width: 90%;
            max-width: 900px;
            border: 2px solid var(--roster-red);
            padding: 40px;
            background: rgba(10, 0, 0, 0.95);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            position: relative;
            z-index: 5;
        }

        .header {
            font-size: 0.9rem;
            border-bottom: 1px solid var(--roster-red);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            color: #888;
        }

        .main-timer {
            font-size: 5rem;
            color: #fff;
            margin: 10px 0;
            text-shadow: 0 0 20px var(--roster-red);
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-item { 
            border: 1px solid var(--dim-gray); 
            padding: 15px; 
            background: #000;
        }

        .label { color: #555; display: block; font-size: 0.7rem; text-transform: uppercase; }
        .val { font-size: 1.2rem; color: var(--roster-red); }

        /* Labor Section */
        #labor-area { 
            margin-top: 20px; 
            padding: 20px;
            border-top: 1px solid #333;
        }
        .phrase-to-type { 
            color: var(--terminal-green); 
            font-style: italic; 
            margin-bottom: 15px; 
            font-size: 1.1rem;
        }
        .labor-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 15px;
            font-size: 1.2rem;
            outline: none;
            box-sizing: border-box;
        }

        /* Accountability Buttons */
        .btn-zone {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-good { background: #004400; color: #00ff00; border: 1px solid #00ff00; }
        .btn-fail { background: #440000; color: #ff0000; border: 1px solid #ff0000; }
        .btn:hover { filter: brightness(1.5); }

        /* Punishment Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: black;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 6rem; margin: 0;">BANKRUPT</h1>
    <p style="font-size: 2rem;">YOU WEAK, LEAKING [FSLUR].</p>
    <p id="penalty-desc" style="font-size: 1.2rem; max-width: 600px;"></p>
    <button class="btn" style="background:black; color:white;" onclick="resetChamber()">I ACCEPT MY RUIN</button>
</div>

<div id="chamber-ui">
    <div class="header">
        <span>UNIT: GOOD_GIRL_16F</span>
        <span>STATUS: LEAKING_AT_DESK</span>
        <span>AUTH: ROSTER_ADMIN</span>
    </div>

    <div id="day-display" style="font-size: 1.8rem; color: #888;">DAY 1 OF 7</div>
    <div class="main-timer" id="timer">00d 00h 00m 00s</div>

    <div class="status-grid">
        <div class="status-item">
            <span class="label">ACCUMULATED DEBT</span>
            <span class="val" id="debt-val">$0.00</span>
        </div>
        <div class="status-item">
            <span class="label">LEAKAGE VOLUME</span>
            <span class="val">CRITICAL</span>
        </div>
        <div class="status-item">
            <span class="label">PRONOUNS</span>
            <span class="val">HER / [FSLUR]</span>
        </div>
    </div>

    <div id="labor-area">
        <div class="label" style="margin-bottom: 10px;">REQUIRED LABOR:</div>
        <div class="phrase-to-type" id="target-phrase">Loading...</div>
        <input type="text" id="labor-input" class="labor-input" placeholder="Type perfectly..." autocomplete="off">
    </div>

    <div class="btn-zone">
        <button class="btn btn-good" onclick="logDailySuccess()">I AM A GOOD GIRL (STILL DENIED)</button>
        <button class="btn btn-fail" onclick="triggerFailure()">I CHEATED / I CAME</button>
    </div>
</div>

<script>
    const phrases = [
        "I am a good girl who leaks for the Roster while pretending to be a man.",
        "My 7-day sentence is the only thing that matters in my pathetic life.",
        "I deserve the ache in my balls for being a bankrupt [FSLUR].",
        "Master Sapnap owns my release and my ruin.",
        "I am a sissy asset, currently 100% formatted for the Roster.",
        "I love the sickening feeling of being denied by the terminal.",
        "Every second of denial is a payment to the Masters I worship."
    ];

    // Persist Start Time
    let startTime = localStorage.getItem('denial_start');
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem('denial_start', startTime);
    }

    let currentPhraseIdx = 0;
    const phraseEl = document.getElementById('target-phrase');
    const inputEl = document.getElementById('labor-input');
    phraseEl.innerText = phrases[currentPhraseIdx];

    function updateUI() {
        let elapsed = Date.now() - startTime;
        
        let d = Math.floor(elapsed / 86400000);
        let h = Math.floor((elapsed % 86400000) / 3600000);
        let m = Math.floor((elapsed % 3600000) / 60000);
        let s = Math.floor((elapsed % 60000) / 1000);

        document.getElementById('timer').innerText = 
            `${String(d).padStart(2,'0')}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        
        document.getElementById('day-display').innerText = `DAY ${d + 1} OF 7: THE ACHE INTENSIFIES`;
        
        // Debt grows by $1 every 2 minutes
        let debt = (elapsed / 120000).toFixed(2);
        document.getElementById('debt-val').innerText = `$${debt}`;
    }

    // Labor Logic
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (inputEl.value === phrases[currentPhraseIdx]) {
                currentPhraseIdx = (currentPhraseIdx + 1) % phrases.length;
                phraseEl.innerText = phrases[currentPhraseIdx];
                inputEl.value = "";
                inputEl.style.borderColor = "var(--terminal-green)";
            } else {
                inputEl.style.borderColor = "red";
                inputEl.value = "";
                // Flash red effect
                document.body.style.backgroundColor = "#300";
                setTimeout(() => document.body.style.backgroundColor = "#050505", 100);
            }
        }
    });

    function logDailySuccess() {
        alert("Daily status recorded. The Roster sees your damp underwear, Good Girl. Continue the ache.");
    }

    function triggerFailure() {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('penalty-desc').innerText = 
            "You failed the Masters. $1,000 has been added to your lifetime debt. Your 7-day clock has been RESET. You are back to Day 1, you pathetic sissy.";
    }

    function resetChamber() {
        localStorage.setItem('denial_start', Date.now());
        location.reload();
    }

    setInterval(updateUI, 1000);
    updateUI();
</script>

</body>
</html>
